  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.7; pointer-events:none;\"><\u002Fdiv>\n    <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.2em; text-transform:uppercase; color:#8A8992;\">Review de canal · YouTube Shorts<\u002Fdiv>\n    <h1 style=\"margin:22px 0 0; font-size:60px; line-height:1.02; font-weight:800; letter-spacing:-0.035em; max-width:880px; text-wrap:balance;\">Diagnóstico &amp; roteiro de crescimento para <span style=\"background:linear-gradient(100deg,#E79BBA,#B89BDC,#7FA8DE,#73C49B);-webkit-background-clip:text;background-clip:text;color:transparent;\">@MariahBrunner.<\u002Fspan><\u002Fh1>\n    <p style=\"margin:32px 0 0; font-size:23px; line-height:1.5; color:#3C3B42; max-width:680px;\">Nicho claro, posicionamento forte — falta ajustar a arquitetura do canal. Este estudo organiza o que já funciona e o que mexer, em sete pilares, com métricas para acompanhar.<\u002Fp>\n    <div style=\"margin-top:34px; display:flex; flex-wrap:wrap; gap:18px 30px; align-items:center; font-family:'Geist Mono',monospace; font-size:14px; color:#5C5B63;\">\n      <span style=\"color:#8A8992;\">Estudo realizado por<\u002Fspan>\n      <strong style=\"font-weight:500; color:#1B1B20; font-size:16px;\">Marina Martins<\u002Fstrong>\n      <a href=\"mailto:smartinsmarina@gmail.com\" style=\"text-decoration:none; color:#5C5B63; border-bottom:1px solid #D8D6D1;\" style-hover=\"color:#9E5A7C;\">smartinsmarina@gmail.com<\u002Fa>\n      <a href=\"https://www.linkedin.com/in/smartinsmarina/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none; color:#5C5B63; border-bottom:1px solid #D8D6D1;\" style-hover=\"color:#9E5A7C;\">linkedin.com/in/smartinsmarina ↗<\u002Fa>\n      <span style=\"color:#B5B4BA;\">Junho 2026<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- DIAGNÓSTICO -->\n  <section id=\"diagnostico\" style=\"padding:64px 40px; max-width:1120px; margin:0 auto;\">\n    <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.16em; text-transform:uppercase; color:#9E5A7C; margin-bottom:14px;\">01 · Diagnóstico<\u002Fdiv>\n    <h2 style=\"margin:0 0 8px; font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1.1;\">Onde o canal está hoje.<\u002Fh2>\n    <div style=\"margin-top:30px; display:flex; gap:10px; font-family:'Geist Mono',monospace; font-size:13px;\">\n      <button onclick=\"{{ tabFunciona }}\" style=\"{{ tabAStyle }}\">✓ O que já funciona<\u002Fbutton>\n      <button onclick=\"{{ tabFocar }}\" style=\"{{ tabBStyle }}\">→ Onde focar<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:26px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px;\">\n      <sc-for list=\"{{ diagCards }}\" as=\"c\" hint-placeholder-count=\"3\">\n        <div style=\"padding:26px 24px; background:#fff; border:1px solid #ECEAE5; border-radius:16px;\" style-hover=\"border-color:#E0CCE0; box-shadow:0 6px 20px rgba(150,110,160,0.08);\">\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px; color:{{ c.tone }}; margin-bottom:10px;\">{{ c.tag }}<\u002Fdiv>\n          <div style=\"font-size:21px; font-weight:600; margin-bottom:8px; line-height:1.2;\">{{ c.title }}<\u002Fdiv>\n          <div style=\"font-size:16.5px; line-height:1.55; color:#5A5961;\">{{ c.body }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PILARES -->\n  <section id=\"pilares\" style=\"padding:64px 40px; background:linear-gradient(180deg,#FBFAF9,#F7F3F8);\">\n    <div style=\"max-width:1120px; margin:0 auto;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.16em; text-transform:uppercase; color:#7B6BB0; margin-bottom:14px;\">02 · Plano de melhoria<\u002Fdiv>\n      <h2 style=\"margin:0 0 6px; font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1.1;\">Sete pilares para revisar.<\u002Fh2>\n      <p style=\"margin:0; font-size:19px; color:#6A6970;\">Clique em um pilar para abrir os detalhes.<\u002Fp>\n\n      <div style=\"margin-top:30px; display:grid; grid-template-columns:repeat(7,1fr); gap:10px;\">\n        <sc-for list=\"{{ pillars }}\" as=\"p\" hint-placeholder-count=\"7\">\n          <button onclick=\"{{ p.select }}\" style=\"{{ p.chipStyle }}\">\n            <div style=\"font-family:'Geist Mono',monospace; font-size:13px; opacity:.7;\">{{ p.num }}<\u002Fdiv>\n            <div style=\"font-size:14.5px; font-weight:600; line-height:1.2; margin-top:6px;\">{{ p.short }}<\u002Fdiv>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:22px; background:#fff; border:1px solid #ECE6F0; border-radius:20px; padding:40px; min-height:240px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:#B0728F; margin-bottom:6px;\">Pilar {{ activePillar.num }} · {{ activePillar.label }}<\u002Fdiv>\n        <h3 style=\"margin:0 0 20px; font-size:30px; font-weight:700; letter-spacing:-0.01em; line-height:1.15;\">{{ activePillar.headline }}<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <sc-for list=\"{{ activePillar.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; gap:14px;\">\n              <div style=\"color:{{ pt.tone }}; font-size:20px; line-height:1.3;\">›<\u002Fdiv>\n              <div style=\"font-size:17.5px; line-height:1.55; color:#3C3B42;\"><strong style=\"font-weight:600; color:#1B1B20;\">{{ pt.lead }}<\u002Fstrong>{{ pt.rest }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FUNIL -->\n  <section id=\"funil\" style=\"padding:64px 40px; max-width:1120px; margin:0 auto;\">\n    <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.16em; text-transform:uppercase; color:#5E84B0; margin-bottom:14px;\">Pilar 06 · Long-form &amp; podcast<\u002Fdiv>\n    <h2 style=\"margin:0 0 8px; font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1.1;\">Sem long-form, creator.<br>Com, autoridade.<\u002Fh2>\n    <p style=\"margin:0 0 28px; font-size:19px; line-height:1.5; color:#6A6970; max-width:660px;\">Shorts vendem produto barato; long-form (8-20 min) vende bootcamp, agentes e cohort. Passe o mouse pelas etapas do funil.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:18px;\">\n      <sc-for list=\"{{ funnel }}\" as=\"f\" hint-placeholder-count=\"3\">\n        <div onmouseenter=\"{{ f.hover }}\" style=\"{{ f.cardStyle }}\">\n          <div style=\"height:8px; border-radius:999px; background:{{ f.bar }}; margin-bottom:18px; width:{{ f.barW }};\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; justify-content:space-between;\">\n            <span style=\"font-size:23px; font-weight:700;\">{{ f.name }}<\u002Fspan>\n            <span style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#9B9AA2;\">{{ f.stage }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#9B9AA2; margin:8px 0 14px;\">{{ f.dur }}<\u002Fdiv>\n          <div style=\"font-size:16.5px; line-height:1.5; color:#5A5961;\">{{ f.body }}<\u002Fdiv>\n          <div style=\"margin-top:16px; padding-top:14px; border-top:1px dashed #E7E1EA; font-size:15px; color:#9E5A7C;\"><strong style=\"font-weight:600;\">Meta:<\u002Fstrong> {{ f.goal }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SEO STRIP -->\n  <section style=\"padding:24px 40px 56px; max-width:1120px; margin:0 auto;\">\n    <div style=\"background:#fff; border:1px solid #ECEAE5; border-radius:20px; padding:38px 40px;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:#5C9B7A; margin-bottom:8px;\">Pilar 05 · SEO &amp; GEO<\u002Fdiv>\n      <h3 style=\"margin:0 0 22px; font-size:28px; font-weight:700;\">Nomeie para busca — inclusive em IA.<\u002Fh3>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:16px 40px;\">\n        <sc-for list=\"{{ seo }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"display:flex; gap:12px;\">\n            <div style=\"color:#5C9B7A; font-weight:700; font-size:18px;\">+<\u002Fdiv>\n            <div><span style=\"font-size:17.5px; font-weight:600;\">{{ s.lead }} <\u002Fspan><span style=\"font-size:16px; line-height:1.5; color:#5A5961;\">{{ s.rest }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- COLABS -->\n  <section id=\"colabs\" style=\"padding:64px 40px; background:linear-gradient(180deg,#F7F3F8,#FBFAF9); \">\n    <div style=\"max-width:1120px; margin:0 auto;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.16em; text-transform:uppercase; color:#A98E4E; margin-bottom:14px;\">Pilar 07 · Colabs &amp; distribuição<\u002Fdiv>\n      <h2 style=\"margin:0 0 8px; font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1.1;\">Escada de colab — de baixo pra cima.<\u002Fh2>\n      <p style=\"margin:0 0 28px; font-size:19px; color:#6A6970;\">Comece pelos pares e suba degrau a degrau.<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; gap:12px;\">\n        <sc-for list=\"{{ ladder }}\" as=\"l\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid; grid-template-columns:200px 1fr 1.4fr; gap:26px; align-items:start; background:#fff; border:1px solid #ECEAE5; border-radius:14px; padding:22px 26px; border-left:4px solid {{ l.tone }};\" style-hover=\"box-shadow:0 6px 18px rgba(150,120,90,0.08);\">\n            <div><div style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#9B9AA2;\">{{ l.num }}<\u002Fdiv><div style=\"font-size:20px; font-weight:700; margin-top:3px;\">{{ l.tier }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"font-size:16px; line-height:1.5; color:#5A5961;\"><div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B5B4BA; margin-bottom:4px;\">Quem<\u002Fdiv>{{ l.who }}<\u002Fdiv>\n            <div style=\"font-size:16px; line-height:1.5; color:#3C3B42;\"><div style=\"font-family:'Geist Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:#B5B4BA; margin-bottom:4px;\">Abordagem<\u002Fdiv>{{ l.how }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MÉTRICAS + CURVA INTERATIVA -->\n  <section id=\"metricas\" style=\"padding:64px 40px 40px; max-width:1120px; margin:0 auto;\">\n    <div style=\"font-family:'Geist Mono',monospace; font-size:14px; letter-spacing:.16em; text-transform:uppercase; color:#9E5A7C; margin-bottom:14px;\">03 · Métricas para acompanhar<\u002Fdiv>\n    <h2 style=\"margin:0 0 8px; font-size:42px; font-weight:700; letter-spacing:-0.02em; line-height:1.1;\">Testar, testar, testar…<\u002Fh2>\n    <p style=\"margin:0 0 30px; font-size:19px; line-height:1.55; color:#5A5961; max-width:760px;\">Com o histórico das métricas, observamos padrões e descobrimos o que testar para aumentar views e retenção. Testes A/B valem para <em>tudo<\u002Fem> em conteúdo, e o Analytics do YouTube dá os dados detalhados.<\u002Fp>\n\n    <div style=\"display:grid; grid-template-columns:0.9fr 1.1fr; gap:44px; align-items:start;\">\n      <div>\n        <div style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#9B9AA2; margin-bottom:18px; line-height:1.5;\">Anote toda segunda no Notion. Se algo cai 2 semanas seguidas, é diagnóstico.<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:14px;\">\n          <sc-for list=\"{{ metrics }}\" as=\"m\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex; gap:16px; align-items:baseline; padding-bottom:14px; border-bottom:1px solid #EDEBE6;\">\n              <div style=\"font-family:'Geist Mono',monospace; font-size:14px; color:{{ m.tone }}; min-width:26px;\">{{ m.num }}<\u002Fdiv>\n              <div><div style=\"font-size:20px; font-weight:700;\">{{ m.title }}<\u002Fdiv><div style=\"font-size:16px; line-height:1.5; color:#5A5961;\">{{ m.body }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:linear-gradient(160deg,#FCF7F9,#F5F7FB); border:1px solid #EAE7EF; border-radius:20px; padding:30px 34px;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:#B0728F; margin-bottom:4px;\">O vale da retenção · interativo<\u002Fdiv>\n        <h3 style=\"margin:0 0 4px; font-size:24px; font-weight:700; line-height:1.15;\">Passe o mouse pela curva.<\u002Fh3>\n        <div ref=\"{{ chartWrap }}\" style=\"position:relative; margin-top:10px; cursor:crosshair;\">\n          <svg ref=\"{{ chartSvg }}\" viewBox=\"0 0 800 360\" style=\"width:100%; height:auto; display:block;\" font-family=\"Geist Mono, monospace\">\n            <defs>\n              <linearGradient id=\"curveg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#E79BBA\"><\u002Fstop><stop offset=\"0.45\" stop-color=\"#9B8BD6\"><\u002Fstop><stop offset=\"1\" stop-color=\"#7FBFA0\"><\u002Fstop><\u002FlinearGradient>\n              <linearGradient id=\"fillg\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#C9A2CC\" stop-opacity=\"0.18\"><\u002Fstop><stop offset=\"1\" stop-color=\"#C9A2CC\" stop-opacity=\"0\"><\u002Fstop><\u002FlinearGradient>\n            <\u002Fdefs>\n            <line x1=\"64\" y1=\"36\" x2=\"64\" y2=\"296\" stroke=\"#DBD8D2\" stroke-width=\"2\"><\u002Fline>\n            <line x1=\"64\" y1=\"296\" x2=\"772\" y2=\"296\" stroke=\"#DBD8D2\" stroke-width=\"2\"><\u002Fline>\n            <rect x=\"196\" y=\"36\" width=\"118\" height=\"260\" fill=\"#E79BBA\" opacity=\"0.10\"><\u002Frect>\n            <path ref=\"{{ areaPath }}\" d=\"M70,96 C160,118 210,86 274,78 C330,71 350,300 408,330 L408,296 L70,296 Z\" fill=\"url(#fillg)\"><\u002Fpath>\n            <path ref=\"{{ linePath }}\" d=\"M70,96 C160,118 210,86 274,78 C330,71 350,300 408,330 C470,360 620,250 760,205\" fill=\"none\" stroke=\"url(#curveg)\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n            <circle cx=\"274\" cy=\"78\" r=\"7\" fill=\"#fff\" stroke=\"#C9628F\" stroke-width=\"3.5\"><\u002Fcircle>\n            <circle cx=\"408\" cy=\"330\" r=\"7\" fill=\"#fff\" stroke=\"#7FA8DE\" stroke-width=\"3.5\"><\u002Fcircle>\n            <text x=\"274\" y=\"58\" text-anchor=\"middle\" font-size=\"15\" fill=\"#9E5A7C\">reassistido<\u002Ftext>\n            <text x=\"420\" y=\"352\" text-anchor=\"middle\" font-size=\"15\" fill=\"#5E84B0\">vale (skip)<\u002Ftext>\n            <text x=\"58\" y=\"32\" text-anchor=\"end\" font-size=\"13\" fill=\"#A7A5AC\">retenção<\u002Ftext>\n            <text x=\"770\" y=\"320\" text-anchor=\"end\" font-size=\"13\" fill=\"#A7A5AC\">duração →<\u002Ftext>\n            <g ref=\"{{ cursor }}\" style=\"opacity:0;\">\n              <line ref=\"{{ cursorLine }}\" x1=\"0\" y1=\"36\" x2=\"0\" y2=\"296\" stroke=\"#B58BCB\" stroke-width=\"1.5\" stroke-dasharray=\"4 4\"><\u002Fline>\n              <circle ref=\"{{ cursorDot }}\" cx=\"0\" cy=\"0\" r=\"6\" fill=\"#9E5A7C\"><\u002Fcircle>\n            <\u002Fg>\n          <\u002Fsvg>\n          <div ref=\"{{ tip }}\" style=\"position:absolute; pointer-events:none; opacity:0; transform:translate(-50%,-120%); background:#1B1B20; color:#fff; padding:8px 12px; border-radius:9px; font-size:13px; line-height:1.4; max-width:200px; box-shadow:0 6px 18px rgba(0,0,0,0.18); transition:opacity .12s;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:14px 0 0; font-size:16px; line-height:1.55; color:#5A5961;\">Um vale revela 2 cenários: a audiência <strong>pulou<\u002Fstrong> o trecho (o óbvio) — ou, logo antes do vale, há um trecho que ela <strong>reassistiu várias vezes<\u002Fstrong>. Esse trecho de valor vira <strong style=\"color:#9E5A7C;\">short / hook<\u002Fstrong> que leva ao vídeo completo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"padding:48px 40px 64px; border-top:1px solid #ECEAE5; margin-top:30px;\">\n    <div style=\"max-width:1120px; margin:0 auto; display:flex; flex-wrap:wrap; gap:20px; align-items:center; justify-content:space-between;\">\n      <div style=\"display:flex; align-items:center; gap:11px; font-weight:700;\"><span style=\"width:12px; height:12px; border-radius:50%; background:linear-gradient(135deg,#E79BBA,#7FA8DE);\"><\u002Fspan> Review de canal · @MariahBrunner<\u002Fdiv>\n      <div style=\"font-family:'Geist Mono',monospace; font-size:13px; color:#74737B; display:flex; gap:18px; flex-wrap:wrap;\">\n        <span>Marina Martins<\u002Fspan>\n        <a href=\"mailto:smartinsmarina@gmail.com\" style=\"text-decoration:none; color:#74737B; border-bottom:1px solid #D8D6D1;\">smartinsmarina@gmail.com<\u002Fa>\n        <a href=\"https://www.linkedin.com/in/smartinsmarina/\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none; color:#74737B; border-bottom:1px solid #D8D6D1;\">LinkedIn ↗<\u002Fa>\n        <span style=\"color:#B5B4BA;\">Junho 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { diagTab: 'funciona', pillar: 0, funnelHover: 0 };\n\n  // refs\n  chartWrap = React.createRef();\n  chartSvg = React.createRef();\n  linePath = React.createRef();\n  cursor = React.createRef();\n  cursorLine = React.createRef();\n  cursorDot = React.createRef();\n  tip = React.createRef();\n\n  componentDidMount() {\n    // animate curve draw-in when scrolled into view\n    const lp = this.linePath.current;\n    if (lp) {\n      const len = lp.getTotalLength();\n      lp.style.strokeDasharray = len;\n      lp.style.strokeDashoffset = len;\n      lp.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';\n      const io = new IntersectionObserver((es) => {\n        es.forEach(e => { if (e.isIntersecting) { lp.style.strokeDashoffset = 0; io.disconnect(); } });\n      }, { threshold: 0.4 });\n      io.observe(lp);\n    }\n    // interactive hover on the chart\n    const wrap = this.chartWrap.current, svg = this.chartSvg.current;\n    if (wrap && svg && lp) {\n      this._move = (ev) => {\n        const r = svg.getBoundingClientRect();\n        const px = ev.clientX - r.left;\n        const vbX = (px / r.width) * 800;          // viewBox x\n        if (vbX < 70 || vbX > 760) { this._hideCursor(); return; }\n        const pt = this._yAt(lp, vbX);\n        if (!pt) return;\n        const scale = r.width / 800;\n        // position cursor (in viewBox coords)\n        this.cursorLine.current.setAttribute('x1', vbX);\n        this.cursorLine.current.setAttribute('x2', vbX);\n        this.cursorDot.current.setAttribute('cx', pt.x);\n        this.cursorDot.current.setAttribute('cy', pt.y);\n        this.cursor.current.style.opacity = 1;\n        // tooltip\n        const tip = this.tip.current;\n        let label;\n        if (vbX >= 196 && vbX <= 314) label = '<b>Trecho reassistido<\u002Fb><br>vira short / hook para o vídeo completo';\n        else if (vbX > 314 && vbX <= 470) label = '<b>Vale<\u002Fb><br>pulou — ou reassistiu o trecho anterior';\n        else { const rp = Math.max(0, Math.min(100, Math.round((296 - pt.y) / 260 * 100))); label = 'retenção ≈ ' + rp + '%'; }\n        tip.innerHTML = label;\n        tip.style.left = (pt.x * scale) + 'px';\n        tip.style.top = (pt.y * scale) + 'px';\n        tip.style.opacity = 1;\n      };\n      this._leave = () => this._hideCursor();\n      wrap.addEventListener('mousemove', this._move);\n      wrap.addEventListener('mouseleave', this._leave);\n    }\n  }\n  componentWillUnmount() {\n    const wrap = this.chartWrap.current;\n    if (wrap) { wrap.removeEventListener('mousemove', this._move); wrap.removeEventListener('mouseleave', this._leave); }\n  }\n  _hideCursor() { if (this.cursor.current) this.cursor.current.style.opacity = 0; if (this.tip.current) this.tip.current.style.opacity = 0; }\n  _yAt(path, x) {\n    const total = path.getTotalLength();\n    let lo = 0, hi = total, p = null;\n    for (let i = 0; i < 18; i++) {\n      const mid = (lo + hi) / 2; p = path.getPointAtLength(mid);\n      if (p.x < x) lo = mid; else hi = mid;\n    }\n    return p;\n  }\n\n  renderVals() {\n    const T = { pink:'#C9628F', purple:'#8E6FB8', blue:'#5E84B0', green:'#5C9B7A', gold:'#A98E4E' };\n\n    // ---- Diagnóstico cards (two tabs) ----\n    const funciona = [\n      { tag:'✓ Não mexa', tone:T.green, title:'Nicho cirurgicamente claro', body:'Você é a \"tradutora do Claude para não-técnicos\".' },\n      { tag:'✓ Não mexa', tone:T.green, title:'Credibilidade instantânea', body:'Amazon + Meta na bio criam autoridade. Mantenha visível no banner, na primeira frase do about e em pelo menos 1 vídeo pinado.' },\n      { tag:'✓ Não mexa', tone:T.green, title:'Voz consistente cross-platform', body:'@itsmariahbrunner no TikTok / Instagram / Threads + email coerentes. A marca pessoal já existe — o YouTube pode explorá-la ainda mais.' },\n    ];\n    const focar = [\n      { tag:'01 · Focar', tone:T.pink, title:'Audiência', body:'Use a aba Posts com trechos do seu blog (sem link de redirecionamento sempre — evasão constante faz o algoritmo recomendar menos). Shorts com ganchos que levam ao conteúdo longo; end card e link de compra no shopping.' },\n      { tag:'02 · Focar', tone:T.purple, title:'Estrutura', body:'O canal é quase 100% shorts. Sem long-form, playlists ou home organizada, você perde autoridade e ne:'Teste texto voltado para GEO.', points:[\n        { tone:T.purple, lead:'Texto na tela pensado para busca por IA (GEO). ', rest:'Os ganchos e a primeira frase devem usar termos que as pessoas pesquisam.' },\n      ]},\n      { num:'03', label:'Conteúdo & ideação', short:'Conteúdo', headline:'Pilares, matriz e sequências serializadas.', points:[\n        { tone:T.blue, lead:'Organize por pilares e matriz. ', rest:'Sequências serializadas dão continuidade e fazem o público voltar.' },\n      ]},\n      { num:'04', label:'End card & CTA', short:'End card', headline:'Decida para onde cada vídeo manda.', points:[\n        { tone:T.green, lead:'Um destino por vídeo. ', rest:'Email, novo seguidor ou outro vídeo? Escolha e seja explícito no end card.' },\n      ]},\n      { num:'05', label:'SEO & GEO', short:'SEO × GEO', headline:'Nomeie para busca — inclusive em IA.', points:[\n        { tone:T.green, lead:'Título com query real. ', rest:'\"Claude vs ChatGPT pra escrever email\" — e principalmente as frases que as pessoas escrevem nas IAs.' },\n        { tone:T.pink, lead:'Primeira frase = SEO. ', rest:'Os 5 primeiros segundos da legenda viram metadata.' },\n        { tone:T.purple, lead:'Hashtags na descrição e bio. ', rest:'#claudeai #aiproductivity #marketingai. Específicas vencem genéricas (#ai está numa janela de muito ruído).' },\n        { tone:T.blue, lead:'Renomeie para série/playlist. ', rest:'Prefixo \"Claude 101: …\" / \"AI Money: …\". Ajuda o algoritmo no match de padrões.' },\n      ]},\n      { num:'06', label:'Long-form & podcast', short:'Long-form', headline:'O long-form que fecha o lifetime value.', points:[\n        { tone:T.pink, lead:'Shorts → awareness. ', rest:'Long-form (8-15 min) → consideration. Podcast/live → conversion. Veja o funil completo abaixo.' },\n      ]},\n      { num:'07', label:'Colabs & distribuição', short:'Colabs', headline:'Escada de colab — de baixo pra cima.', points:[\n        { tone:T.gold, lead:'Comece pelos pares. ', rest:'Suba até autoridade: pares → ecossistema → vertical → autoridade. Veja a escada na seção Colabs.' },\n      ]},\n    ];\n    const chipTones = [T.pink,T.purple,T.blue,T.green,'#5C9B7A',T.pink,T.gold];\n    const pillars = pillarData.map((p, i) => {\n      const active = i === this.state.pillar;\n      return {\n        num:p.num, short:p.short,\n        select: () => this.setState({ pillar:i }),\n        chipStyle: 'cursor:pointer; text-align:left; padding:14px 14px; border-radius:13px; font-family:inherit; transition:all .15s; '\n          + (active\n            ? 'background:linear-gradient(135deg,#F4DCE8,#E5DBF4); border:1px solid #DCC4DE; color:#1B1B20;'\n            : 'background:#fff; border:1px solid #ECE6F0; color:#6A6970;'),\n      };\n    });\n    const activePillar = pillarData[this.state.pillar];\n\n    // ---- Funnel ----\n    const funnelData = [\n      { name:'Shorts', stage:'Awareness', dur:'30-60s', body:'Hook + 1 demo.', goal:'salvamento + seguidor', bar:'#F1B6CC', barW:'40%' },\n      { name:'Long-form', stage:'Consideration', dur:'8-15 min', body:'Build-along ou deep-dive.', goal:'watch time + captura de email', bar:'#B6C4F1', barW:'70%' },\n      { name:'Podcast / Live', stage:'Conversion', dur:'30-60 min', body:'Convidados + Q&A do público.', goal:'trust + venda de bootcamp / agente', bar:'#B6E1C6', barW:'100%' },\n    ];\n    const funnel = funnelData.map((f, i) => ({\n      ...f,\n      hover: () => this.setState({ funnelHover:i }),\n      cardStyle: 'background:#fff; border-radius:18px; padding:26px 26px; transition:all .18s; cursor:default; '\n        + (i === this.state.funnelHover\n          ? 'border:1px solid #DCC4DE; box-shadow:0 10px 30px rgba(150,110,160,0.12); transform:translateY(-4px);'\n          : 'border:1px solid #ECEAE5;'),\n    }));\n\n    // ---- SEO ----\n    const seo = [\n      { lead:'Título com query real.', rest:'\"Claude vs ChatGPT pra escrever email\". Principalmente, use as frases que as pessoas escrevem nas IAs.' },\n      { lead:'Primeira frase = SEO.', rest:'Os 5 primeiros segundos da legenda viram metadata.' },\n      { lead:'Hashtags na descrição e bio.', rest:'#claudeai #aiproductivity #marketingai. Específicas vencem genéricas (#ai está numa janela de muito ruído).' },\n      { lead:'Renomeie para série/playlist.', rest:'Prefixo \"Claude 101: …\" / \"AI Money: …\". Ajuda o algoritmo no match de padrões.' },\n    ];\n\n    // ---- Colab ladder ----\n    const ladder = [\n      { num:'01', tier:'Pares', tone:'#F1B6CC', who:'Creators 5k-30k em IA / produtividade.', how:'\"Trocamos shorts: você reage ao meu prompt, eu ao seu.\"' },\n      { num:'02', tier:'Ecossistema', tone:'#C9A2DC', who:'Pessoal do Claude (oficial), Manus, Stan, Skool.', how:'Ofereça-se como case study oficial: eles publicam, você ganha.' },\n      { num:'03', tier:'Vertical', tone:'#9BB4E0', who:'Educadores fora de IA (finance, design, RH).', how:'\"Quero te mostrar como o Claude resolve X dor da sua audiência.\"' },\n      { num:'04', tier:'Autoridade', tone:'#9FCDB0', who:'Podcasts B2B grandes, AI Engineer Summit.', how:'Pitch com número: \"X% das pessoas usam Claude errado — vou provar.\"' },\n    ];\n\n    // ---- Metrics ----\n    const metrics = [\n      { num:'01', tone:T.pink, title:'Hook retention', body:'% que assiste além dos primeiros 3s. Se cair, reescreva o hook — não o tema.' },\n      { num:'02', tone:T.purple, title:'Average view duration', body:'Indicador real de qualidade.' },\n      { num:'03', tone:T.blue, title:'CTR do link na bio', body:'Mede o CTA real, não o engajamento.' },\n    ];\n\n    return {\n      navClick: () => {},\n      diagCards,\n      tabFunciona: () => this.setState({ diagTab:'funciona' }),\n      tabFocar: () => this.setState({ diagTab:'focar' }),\n      tabAStyle: tabBase + (this.state.diagTab === 'funciona' ? on : off),\n      tabBStyle: tabBase + (this.state.diagTab === 'focar' ? on : off),\n      pillars, activePillar,\n      funnel, seo, ladder, metrics,\n      chartWrap:this.chartWrap, chartSvg:this.chartSvg, linePath:this.linePath, areaPath:React.createRef(),\n      cursor:this.cursor, cursorLine:this.cursorLine, cursorDot:this.cursorDot, tip:this.tip,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
